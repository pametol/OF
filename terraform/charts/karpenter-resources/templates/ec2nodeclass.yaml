{{- range $arch := .Values.architectures }}
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ $arch }}
spec:
  # AL2023 is multi-arch; the alias resolves the correct amd64/arm64 AMI.
  amiSelectorTerms:
    - alias: al2023@latest
  role: {{ $.Values.nodeRole | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $.Values.discoveryTag | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $.Values.discoveryTag | quote }}
  # IMDSv2 only, hop limit 1 so pods cannot reach node credentials.
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 1
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  tags:
{{- range $k, $v := $.Values.tags }}
    {{ $k }}: {{ $v | quote }}
{{- end }}
    # EC2 console Name tag reflects the pool the node belongs to.
    Name: {{ printf "%s-karpenter-%s" $.Values.discoveryTag $arch | quote }}
{{- end }}
