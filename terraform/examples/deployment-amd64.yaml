# Runs on x86 / amd64 nodes. Karpenter sees the unschedulable pods, matches the
# nodeSelector against the amd64 NodePool, and launches a spot (or on-demand
# fallback) Intel/AMD instance.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-amd64
  labels:
    app: hello-amd64
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-amd64
  template:
    metadata:
      labels:
        app: hello-amd64
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: web
          image: public.ecr.aws/docker/library/nginx:stable
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
